; ══════════════════════════════════════════════════════════════════════════════
; platformio.ini
; ESP32-S3 WROOM-1 — Dashboard + NFC + ST7789 TFT
; ══════════════════════════════════════════════════════════════════════════════

[env:esp32-s3-devkitm-1]
platform  = espressif32
board     = esp32-s3-devkitm-1
framework = arduino

; ── Serial / Monitor ──────────────────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; CRITICAL for ESP32-S3 USB-CDC:
; These flags tell the monitor to assert DTR/RTS which signals to the ESP32
; that a host has opened the port — this is what Serial (CDC) waits for.
monitor_dtr = 1
monitor_rts = 1

; ── Flash / PSRAM ─────────────────────────────────────────────────────────────
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode          = qio
board_build.flash_size          = 8MB
board_build.partitions          = huge_app.csv

build_flags =
    ; ── USB CDC ───────────────────────────────────────────────────────────────
    ; ARDUINO_USB_CDC_ON_BOOT=1 routes Serial through USB-CDC (not UART).
    ; The device waits for the host to open COM port before sending Serial output.
    ; main.cpp has: while(!Serial && millis()<5000) delay(10);  to handle this.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

    ; ── ArduinoJson ───────────────────────────────────────────────────────────
    -DARDUINOJSON_USE_LONG_LONG=1

    ; ══════════════════════════════════════════════════════════════════════════
    ; TFT_eSPI — ALL config via build_flags
    ; ══════════════════════════════════════════════════════════════════════════
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DUSE_HSPI_PORT

    ; TFT pin assignments
    -DTFT_MOSI=4
    -DTFT_MISO=-1
    -DTFT_SCLK=5
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=8
    -DTFT_BL=9

    ; Display geometry
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_BACKLIGHT_ON=HIGH

    ; Color order: TFT_RGB so color565(R,G,B) renders correctly
    -DTFT_RGB_ORDER=TFT_RGB

    ; Fonts
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1

    ; SPI speed
    -DSPI_FREQUENCY=20000000
    -DSPI_READ_FREQUENCY=6000000
    -DSPI_TOUCH_FREQUENCY=2500000

    -DDISABLE_ALL_LIBRARY_WARNINGS

; ── Libraries ─────────────────────────────────────────────────────────────────
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    adafruit/Adafruit PN532@^1.3.1
    adafruit/Adafruit BusIO
    bblanchon/ArduinoJson@^6.21.3
    bodmer/TJpg_Decoder@^1.0.8